name: Generate Tag Index

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tag-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate tags.json, groups.json, and summary files
        run: |
          python - <<'PY'
          import copy
          import datetime
          import json
          import re
          from pathlib import Path

          ROOT = Path(".")
          TAGS_DIR = ROOT / "tags"
          GROUPS_DIR = ROOT / "groups"
          DATE_FILE_RE = re.compile(r"^\d{4}-\d{2}-\d{2}\.json$")
          now = datetime.datetime.now(tz=datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def to_date_timestamp(value):
              if not isinstance(value, str):
                  return 0
              normalized = value.strip()
              if not normalized:
                  return 0
              try:
                  dt = datetime.datetime.strptime(normalized, "%Y-%m-%d")
                  return int(dt.replace(tzinfo=datetime.timezone.utc).timestamp())
              except Exception:
                  return 0

          TAGS_DIR.mkdir(exist_ok=True)
          GROUPS_DIR.mkdir(exist_ok=True)

          group_definitions = []
          group_config = ROOT / "group.json"
          if group_config.exists():
              try:
                  group_payload = json.loads(group_config.read_text(encoding="utf-8"))
                  raw_groups = group_payload.get("groups")
                  if isinstance(raw_groups, list):
                      for raw_group in raw_groups:
                          if not isinstance(raw_group, dict):
                              continue
                          group_name = str(raw_group.get("group", "")).strip()
                          if not group_name:
                              continue
                          raw_tags = raw_group.get("tags")
                          tags = []
                          if isinstance(raw_tags, list):
                              for raw_tag in raw_tags:
                                  normalized_tag = str(raw_tag).strip()
                                  if normalized_tag and normalized_tag not in tags:
                                      tags.append(normalized_tag)
                          group_definitions.append({"group": group_name, "tags": tags})
              except Exception:
                  pass

          existing_tag_manifest = ROOT / "tags.json"
          stale_files = set()
          if existing_tag_manifest.exists():
              try:
                  old_data = json.loads(existing_tag_manifest.read_text(encoding="utf-8"))
                  for item in old_data.get("tags", []):
                      file_name = item.get("file")
                      if isinstance(file_name, str) and file_name.endswith(".json"):
                          stale_files.add(file_name)
              except Exception:
                  pass

          tag_to_entries = {}
          generated_files = set()
          group_to_entries = {item["group"]: [] for item in group_definitions}
          group_seen_keys = {item["group"]: set() for item in group_definitions}

          for file_path in sorted(ROOT.glob("*.json"), reverse=True):
              if not DATE_FILE_RE.match(file_path.name):
                  continue
              try:
                  payload = json.loads(file_path.read_text(encoding="utf-8"))
              except Exception:
                  continue

              date_value = payload.get("date")
              summaries = payload.get("summary")
              if not isinstance(summaries, list):
                  continue

              for item in summaries:
                  if not isinstance(item, dict):
                      continue

                  tags = item.get("tags")
                  tag_list = []
                  if isinstance(tags, list):
                      for raw_tag in tags:
                          normalized_tag = str(raw_tag).strip()
                          if normalized_tag:
                              tag_list.append(normalized_tag)
                  if not tag_list:
                      tag_list = ["未分类"]

                  sort_timestamp = to_date_timestamp(date_value)
                  if sort_timestamp == 0:
                      sort_timestamp = to_date_timestamp(file_path.stem)

                  normalized = copy.deepcopy(item)
                  normalized["date"] = date_value
                  normalized["_sort_date"] = sort_timestamp

                  item_key = json.dumps(
                      {
                          "date": date_value,
                          "title": normalized.get("title"),
                          "summary": normalized.get("summary"),
                          "links": item.get("links"),
                          "tags": normalized.get("tags"),
                      },
                      ensure_ascii=False,
                      sort_keys=True,
                  )

                  normalized.pop("links", None)

                  for tag in tag_list:
                      tag_to_entries.setdefault(tag, []).append(copy.deepcopy(normalized))

                  if group_definitions:
                      item_tags = set(tag_list)
                      for group_item in group_definitions:
                          group_name = group_item["group"]
                          group_tags = group_item["tags"]
                          if not item_tags.intersection(group_tags):
                              continue
                          if item_key in group_seen_keys[group_name]:
                              continue
                          group_seen_keys[group_name].add(item_key)
                          group_to_entries[group_name].append(copy.deepcopy(normalized))

          tag_items = []
          for tag, entries in tag_to_entries.items():
              entries.sort(key=lambda x: x.get("_sort_date", 0), reverse=True)
              for item in entries:
                  item.pop("_sort_date", None)

              file_name = f"tags/{tag}.json"
              generated_files.add(file_name)
              target = ROOT / file_name
              target.write_text(
                  json.dumps(
                      {
                          "tag": tag,
                          "generated_at": now,
                          "summary": entries,
                      },
                      ensure_ascii=False,
                      indent=2,
                  )
                  + "\n",
                  encoding="utf-8",
              )
              tag_items.append(
                  {
                      "tag": tag,
                      "count": len(entries),
                      "file": file_name,
                  }
              )

          expected_group_files = set()
          for group_name, entries in group_to_entries.items():
              entries.sort(key=lambda x: x.get("_sort_date", 0), reverse=True)
              for item in entries:
                  item.pop("_sort_date", None)

              file_name = f"groups/{group_name}.json"
              expected_group_files.add(file_name)
              target = ROOT / file_name
              target.write_text(
                  json.dumps(
                      {
                          "group": group_name,
                          "generated_at": now,
                          "summary": entries,
                      },
                      ensure_ascii=False,
                      indent=2,
                  )
                  + "\n",
                  encoding="utf-8",
              )

          for stale_path in GROUPS_DIR.glob("*.json"):
              relative_name = f"groups/{stale_path.name}"
              if relative_name not in expected_group_files:
                  stale_path.unlink()

          for stale in stale_files - generated_files:
              stale_path = ROOT / stale
              if stale_path.exists():
                  stale_path.unlink()

          tag_items.sort(key=lambda x: (-x["count"], x["tag"]))
          (ROOT / "tags.json").write_text(
              json.dumps(
                  {
                      "generated_at": now,
                      "tags": tag_items,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate tag index"
          git push
