<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1,minimum-scale=1.0,maximum-scale=1.0" />
  <title>每日热点播报 · News Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --surface: rgba(16, 25, 51, 0.7);
      --surface-border: rgba(146, 173, 255, 0.25);
      --text: #f5f7ff;
      --muted: #a9b5dc;
      --accent: #86f7ff;
      --accent-2: #ffca86;
      --tag-bg: rgba(134, 247, 255, 0.16);
      --tag-text: #c6fbff;
      --card-shadow: 0 24px 60px rgba(6, 10, 23, 0.55);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Noto Serif SC", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #1a2d63 0%, transparent 35%),
        radial-gradient(circle at 85% 10%, #3a1d58 0%, transparent 30%),
        radial-gradient(circle at 50% 85%, #1f4f5d 0%, transparent 40%),
        var(--bg);
      background-attachment: fixed;
      line-height: 1.7;
      padding-bottom: 9rem;
      text-autospace: normal;
    }

    .container {
      width: min(1080px, calc(100% - 2rem));
      margin: 2.5rem auto 5rem;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--surface-border);
      border-radius: 22px;
      padding: 1.2rem;
      background: linear-gradient(135deg, rgba(31, 43, 81, 0.92), rgba(11, 17, 35, 0.88));
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
    }

    .hero h2 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      font-weight: 700;
      flex: 1 1 auto;
    }

    .site-title-link {
      color: inherit;
      text-decoration: none;
    }

    .site-title-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    .hero-links {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .group-links {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: .55rem;
    }

    .hero a {
      color: var(--muted);
    }

    .top-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 1.9rem;
      padding: 0 .75rem;
      border-radius: 10px;
      border: 1px solid rgba(173, 193, 255, 0.42);
      background: rgba(255, 255, 255, 0.08);
      color: #f7f9ff;
      text-decoration: none;
      font-size: .88rem;
      transition: background .2s ease, border-color .2s ease;
    }

    .top-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(134, 247, 255, 0.65);
    }

    .top-btn.active {
      border-color: rgba(255, 202, 134, 0.9);
      background: rgba(255, 202, 134, 0.18);
      color: #fff5e9;
    }

    .hero-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .92rem;
    }

    .hero-link:hover {
      color: #f7f9ff;
      text-decoration: underline;
      text-underline-offset: .2em;
    }

    .query {
      margin-top: 0.9rem;
      color: #dbe5ff;
      font-size: 0.95rem;
    }

    .day {
      margin-top: 1.5rem;
      padding: 1.4rem 1.2rem 0.6rem;
      border-radius: 18px;
      border: 1px solid var(--surface-border);
      background: var(--surface);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(8px);
    }

    .day-title {
      margin: 0 0 1rem;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.55rem, 2.8vw, 2rem);
      letter-spacing: 0.08em;
      color: var(--accent-2);
    }

    .day-title-link {
      color: inherit;
      text-decoration: none;
    }

    .day-title-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    .card {
      margin: 0 0 1rem;
      padding: 1.1rem 1.05rem 1rem;
      border-radius: 14px;
      border: 1px solid rgba(173, 193, 255, 0.2);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
      transform: translateY(0);
      transition: transform .3s ease, border-color .3s ease, background .3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(134, 247, 255, 0.45);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03));
    }

    .card.playing {
      border-color: rgba(255, 202, 134, 0.86);
      background: linear-gradient(165deg, rgba(255, 232, 194, 0.22), rgba(255, 255, 255, 0.06));
      box-shadow: 0 0 0 1px rgba(255, 202, 134, 0.35), 0 16px 35px rgba(8, 11, 26, 0.4);
    }

    .title {
      margin: 0 0 .65rem;
      font-size: 1.08rem;
      font-weight: 700;
      color: #f6f9ff;
    }

    .summary {
      margin: .72rem 0 0;
      color: #d8e0fb;
      font-size: .98rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: .2rem .55rem;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: .8rem;
      border: 1px solid rgba(134, 247, 255, 0.22);
      white-space: nowrap;
    }

    .tag-directory {
      display: grid;
      gap: .75rem;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      margin-bottom: 1rem;
    }

    .tag-directory-item {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: .6rem;
      text-decoration: none;
      border-radius: 12px;
      border: 1px solid rgba(173, 193, 255, 0.28);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      color: #f5f7ff;
      padding: .6rem .7rem;
      transition: transform .2s ease, border-color .2s ease;
    }

    .tag-directory-item:hover {
      transform: translateY(-2px);
      border-color: rgba(134, 247, 255, 0.45);
    }

    .tag-directory-count {
      color: var(--muted);
      font-size: .85rem;
    }

    .empty {
      margin: 0 0 1rem;
      padding: 1rem;
      border-radius: 12px;
      border: 1px dashed rgba(255, 202, 134, 0.38);
      color: #f8d9b2;
      background: rgba(124, 77, 20, 0.18);
    }

    .status {
      margin: 1rem 0 0;
      color: var(--muted);
      text-align: center;
      min-height: 1.4rem;
      font-size: .92rem;
    }

    .voice-toolbar {
      position: fixed;
      left: 50%;
      bottom: 1.1rem;
      transform: translateX(-50%);
      width: min(1080px, calc(100% - 1rem));
      border-radius: 16px;
      border: 1px solid rgba(173, 193, 255, 0.34);
      background: linear-gradient(145deg, rgba(12, 21, 43, 0.96), rgba(7, 12, 26, 0.92));
      box-shadow: 0 18px 48px rgba(5, 9, 20, 0.55);
      backdrop-filter: blur(14px);
      z-index: 20;
      padding: .8rem;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: .6rem;
      align-items: center;
    }

    .voice-controls {
      display: flex;
      flex-wrap: wrap;
      gap: .55rem;
      align-items: center;
    }

    .voice-provider,
    .voice-token {
      height: 2.15rem;
      border-radius: 10px;
      border: 1px solid rgba(173, 193, 255, 0.45);
      background: rgba(14, 24, 47, 0.85);
      color: #f7f9ff;
      font-family: inherit;
      font-size: .92rem;
      padding: 0 .62rem;
      outline: none;
    }

    .voice-provider:focus,
    .voice-token:focus {
      border-color: rgba(134, 247, 255, 0.85);
      box-shadow: 0 0 0 2px rgba(134, 247, 255, 0.18);
    }

    .voice-token-wrap {
      display: none;
      align-items: center;
      gap: .45rem;
      color: #d9e2ff;
      font-size: .86rem;
    }

    .voice-token-wrap.show {
      display: inline-flex;
    }

    .voice-token {
      min-width: 260px;
    }

    .voice-btn {
      height: 2.15rem;
      border-radius: 10px;
      border: 1px solid rgba(173, 193, 255, 0.42);
      background: rgba(255, 255, 255, 0.08);
      color: #f7f9ff;
      padding: 0 .85rem;
      font-family: inherit;
      font-size: .9rem;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
    }

    .voice-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(134, 247, 255, 0.65);
    }

    .voice-btn.primary {
      border-color: rgba(255, 202, 134, 0.62);
      background: linear-gradient(135deg, rgba(255, 202, 134, 0.26), rgba(255, 174, 96, 0.22));
      color: #fff5e9;
    }

    .voice-state {
      font-size: .86rem;
      color: #d2ddff;
      text-align: right;
      min-height: 1.2rem;
    }

    @media (max-width: 820px) {
      .voice-toolbar {
        grid-template-columns: 1fr;
      }

      .voice-token {
        min-width: 0;
        width: 100%;
      }

      .voice-state {
        text-align: left;
      }
    }

    @media (max-width: 750px) {
      .hero {
        align-items: flex-start;
      }

      .hero h2 {
        flex-basis: 100%;
      }

      .hero-links {
        width: 100%;
        margin-left: 0;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h2><a class="site-title-link" href="./">每日热点语音播报</a></h2>
      <div class="hero-links">
        <div class="group-links" id="group-links" aria-label="分组导航"></div>
        <a class="top-btn" id="tags-button" href="?tags">标签</a>
        <a class="hero-link" href="https://x.com/codersoar">x@codersoar</a>
      </div>
    </section>
    <section id="content"></section>
    <div class="status" id="status"></div>
    <div id="sentinel" aria-hidden="true"></div>
  </main>

  <div class="voice-toolbar" role="region" aria-label="语音播放控制条">
    <div class="voice-controls">
      <select id="voice-provider" class="voice-provider" aria-label="语音服务提供方">
        <option value="browser">浏览器内置</option>
        <option value="mimo">Mimo</option>
      </select>
      <label class="voice-token-wrap" id="voice-token-wrap" for="voice-token">
        <span>Token</span>
        <input id="voice-token" class="voice-token" type="password" placeholder="输入 Mimo token">
      </label>
    </div>
    <div class="voice-controls">
      <button id="voice-play-toggle" class="voice-btn primary" type="button">播放</button>
      <button id="voice-stop" class="voice-btn" type="button">停止</button>
    </div>
    <div class="voice-state" id="voice-state">等待播放</div>
  </div>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const contentEl = document.getElementById("content");
    const statusEl = document.getElementById("status");
    const sentinel = document.getElementById("sentinel");
    const providerEl = document.getElementById("voice-provider");
    const tokenWrapEl = document.getElementById("voice-token-wrap");
    const tokenEl = document.getElementById("voice-token");
    const playToggleEl = document.getElementById("voice-play-toggle");
    const stopEl = document.getElementById("voice-stop");
    const voiceStateEl = document.getElementById("voice-state");
    const groupLinksEl = document.getElementById("group-links");
    const tagsButtonEl = document.getElementById("tags-button");
    const VOICE_PROVIDER_STORAGE_KEY = "news.voice.provider";
    const VOICE_TOKEN_STORAGE_KEY = "news.voice.token";
    const LOOP_CURRENT_DAY = true;
    const MAX_CONSECUTIVE_EMPTY_DAYS = 3;
    const loadedDays = new Set();
    let loading = false;
    let loadStoppedByEmptyDays = false;
    let nextDate = getInitialDate();
    let currentAudio = null;
    let currentUtterance = null;
    let activeCard = null;
    let playbackRunning = false;
    let playbackPaused = false;
    let playbackCursor = 0;
    let playbackToken = 0;
    const mimoAudioUrlCache = new Map();
    const mimoFetchPromiseCache = new Map();
    const PAGE_MODE = queryParams.has("tags") ? "tags" : (queryParams.get("group") ? "group" : (queryParams.get("tag") ? "tag" : "home"));
    const CURRENT_GROUP = (queryParams.get("group") || "").trim();
    const CURRENT_TAG = (queryParams.get("tag") || "").trim();


    function pad(v) {
      return String(v).padStart(2, "0");
    }

    function formatDate(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function parseDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      const date = new Date(year, month - 1, day, 12, 0, 0);
      if (
        date.getFullYear() !== year ||
        date.getMonth() !== month - 1 ||
        date.getDate() !== day
      ) {
        return null;
      }
      return date;
    }

    function isValidDateString(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
      return !!parseDate(value);
    }

    function previousDate(dateString) {
      const date = parseDate(dateString);
      if (!date) return dateString;
      date.setDate(date.getDate() - 1);
      return formatDate(date);
    }

    function getInitialDate() {
      const input = queryParams.get("date");
      if (input && isValidDateString(input)) {
        return input;
      }
      return new Date().toISOString().slice(0, 10);
    }

    function renderDayTitle(date) {
      const day = document.createElement("section");
      day.className = "day";
      const title = document.createElement("h2");
      title.className = "day-title";
      if (isValidDateString(date)) {
        const titleLink = document.createElement("a");
        titleLink.className = "day-title-link";
        titleLink.href = `?date=${encodeURIComponent(date)}`;
        titleLink.textContent = date;
        title.appendChild(titleLink);
      } else {
        title.textContent = date;
      }
      day.appendChild(title);
      contentEl.appendChild(day);
      return day;
    }

    function renderCard(item, dayEl) {
      const card = document.createElement("article");
      card.className = "card";

      const title = document.createElement("h3");
      title.className = "title";
      title.textContent = item.title || "未命名热点";
      card.appendChild(title);

      const tags = document.createElement("div");
      tags.className = "tags";
      const tagList = Array.isArray(item.tags) && item.tags.length ? item.tags : ["未分类"];
      tagList.forEach(tag => {
        const node = document.createElement("span");
        node.className = "tag";
        node.textContent = tag;
        tags.appendChild(node);
      });
      card.appendChild(tags);

      const normalizedSummary = normalizeSummaryText(item.summary || "");
      if (normalizedSummary) {
        const summary = document.createElement("p");
        summary.className = "summary";
        summary.textContent = normalizedSummary;
        card.appendChild(summary);
      }

      dayEl.appendChild(card);
    }

    function renderEmpty(date, text) {
      const dayEl = renderDayTitle(date);
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = text;
      dayEl.appendChild(empty);
    }

    function updateVoiceState(text) {
      voiceStateEl.textContent = text;
    }

    function saveVoiceProvider() {
      localStorage.setItem(VOICE_PROVIDER_STORAGE_KEY, providerEl.value);
    }

    function saveVoiceToken() {
      localStorage.setItem(VOICE_TOKEN_STORAGE_KEY, tokenEl.value);
    }

    function restoreVoiceSettings() {
      const savedProvider = localStorage.getItem(VOICE_PROVIDER_STORAGE_KEY);
      if (savedProvider === "browser" || savedProvider === "mimo") {
        providerEl.value = savedProvider;
      }
      tokenEl.value = localStorage.getItem(VOICE_TOKEN_STORAGE_KEY) || "";
      tokenWrapEl.classList.toggle("show", providerEl.value === "mimo");
    }

    function updatePlayButton() {
      if (!playbackRunning) {
        playToggleEl.textContent = "播放";
        return;
      }
      playToggleEl.textContent = playbackPaused ? "继续" : "暂停";
    }

    function setActiveCard(card) {
      if (activeCard && activeCard !== card) {
        activeCard.classList.remove("playing");
      }
      activeCard = card || null;
      if (activeCard) {
        activeCard.classList.add("playing");
      }
    }

    function centerCard(card) {
      if (!card) return;
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function normalizeSummaryText(summary) {
      const text = (summary || "").trim();
      if (!text) return "";
      if (isMeaninglessSummaryText(text)) return "";
      if (text.endsWith("。")) return text;
      const lastChinesePeriodIndex = text.lastIndexOf("。");
      if (lastChinesePeriodIndex === -1) {
        return text;
      }
      return text.slice(0, lastChinesePeriodIndex + 1);
    }

    function isMeaninglessSummaryText(text) {
      const compactText = text.replace(/[\s，。！？、,.!?；;：:“”"'‘’【】（）()《》<>]/g, "");
      if (!compactText) return true;
      if (compactText.includes("你好") || compactText.includes("您好")) {
        return true;
      }
      return false;
    }

    function collectSpeakableItems() {
      const dayEls = Array.from(contentEl.querySelectorAll(".day"));
      const firstPlayableDayEl = dayEls.find(dayEl => dayEl.querySelector(".card"));
      const cards = firstPlayableDayEl
        ? Array.from(firstPlayableDayEl.querySelectorAll(".card"))
        : Array.from(contentEl.querySelectorAll(".card"));
      return cards
        .map(card => {
          const title = card.querySelector(".title")?.textContent?.trim() || "";
          const summaryRaw = card.querySelector(".summary")?.textContent?.trim() || "";
          const summary = normalizeSummaryText(summaryRaw);
          const text = [title, summary].filter(Boolean).join("。 ");
          return { card, text };
        })
        .filter(item => item.text);
    }

    async function ensureSpeakableItems() {
      let items = collectSpeakableItems();
      if (items.length) return items;

      updateVoiceState("正在查找可播放日期");
      while (!loadStoppedByEmptyDays) {
        if (loading) {
          await new Promise(resolve => setTimeout(resolve, 120));
        } else {
          await loadNext();
        }
        items = collectSpeakableItems();
        if (items.length) {
          return items;
        }
      }

      return [];
    }

    function clearSpeechEngines() {
      if (currentAudio) {
        if (currentAudio.src.startsWith("blob:")) {
          URL.revokeObjectURL(currentAudio.src);
        }
        currentAudio.pause();
        currentAudio.src = "";
        currentAudio = null;
      }
      if (currentUtterance) {
        speechSynthesis.cancel();
        currentUtterance = null;
      }
    }

    function clearMimoCache() {
      mimoAudioUrlCache.forEach(url => URL.revokeObjectURL(url));
      mimoAudioUrlCache.clear();
      mimoFetchPromiseCache.clear();
    }

    function stopPlayback(message = "已停止") {
      playbackToken += 1;
      playbackRunning = false;
      playbackPaused = false;
      playbackCursor = 0;
      clearSpeechEngines();
      clearMimoCache();
      setActiveCard(null);
      updatePlayButton();
      updateVoiceState(message);
    }

    function pausePlayback() {
      if (!playbackRunning || playbackPaused) return;
      if (providerEl.value === "browser") {
        speechSynthesis.pause();
      } else if (currentAudio) {
        currentAudio.pause();
      }
      playbackPaused = true;
      updatePlayButton();
      updateVoiceState("已暂停");
    }

    function resumePlayback() {
      if (!playbackRunning || !playbackPaused) return;
      if (providerEl.value === "browser") {
        speechSynthesis.resume();
      } else if (currentAudio) {
        const playResult = currentAudio.play();
        if (playResult && typeof playResult.catch === "function") {
          playResult.catch(() => {});
        }
      }
      playbackPaused = false;
      updatePlayButton();
      updateVoiceState("播放中");
    }

    function decodeBase64ToBlob(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new Blob([bytes], { type: "audio/wav" });
    }

    function speakWithBrowser(text, token) {
      return new Promise(resolve => {
        if (token !== playbackToken) {
          resolve();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 1;
        utterance.pitch = 1;
        currentUtterance = utterance;
        utterance.onend = () => {
          currentUtterance = null;
          resolve();
        };
        utterance.onerror = () => {
          currentUtterance = null;
          resolve();
        };
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      });
    }

    async function requestMimoAudioUrl(text, token, shouldShowSynthState) {
      const mimoToken = tokenEl.value.trim();
      if (!mimoToken) {
        throw new Error("请先输入 Mimo token");
      }
      if (shouldShowSynthState) {
        updateVoiceState("音频合成中");
      }
      const response = await fetch("https://api.xiaomimimo.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + mimoToken
        },
        body: JSON.stringify({
          model: "mimo-v2.5-tts",
          messages: [{
            role: "assistant",
            content: text
          }],
          audio: {
            format: "wav",
            voice: "茉莉"
          }
        })
      });

      if (!response.ok) {
        throw new Error(`Mimo 请求失败: ${response.status}`);
      }

      const data = await response.json();
      const base64Audio = data?.choices?.[0]?.message?.audio?.data;
      if (!base64Audio) {
        throw new Error("Mimo 返回中未找到音频数据");
      }

      if (token !== playbackToken) {
        throw new Error("播放已停止");
      }

      const blob = decodeBase64ToBlob(base64Audio);
      return URL.createObjectURL(blob);
    }

    async function getMimoAudioUrl(items, index, token, shouldShowSynthState) {
      if (mimoAudioUrlCache.has(index)) {
        return mimoAudioUrlCache.get(index);
      }
      if (!mimoFetchPromiseCache.has(index)) {
        const promise = requestMimoAudioUrl(items[index].text, token, shouldShowSynthState)
          .then(url => {
            mimoAudioUrlCache.set(index, url);
            return url;
          })
          .finally(() => {
            mimoFetchPromiseCache.delete(index);
          });
        mimoFetchPromiseCache.set(index, promise);
      }
      return mimoFetchPromiseCache.get(index);
    }

    function preloadMimoAudio(items, index, token) {
      if (index < 0 || index >= items.length) return;
      if (mimoAudioUrlCache.has(index) || mimoFetchPromiseCache.has(index)) return;
      getMimoAudioUrl(items, index, token, false).catch(() => {});
    }

    function playMimoAudioUrl(url) {
      return new Promise((resolve, reject) => {
        const audio = new Audio(url);
        audio.preload = "auto";
        audio.muted = false;
        audio.volume = 1;
        audio.setAttribute("playsinline", "");
        currentAudio = audio;
        let started = false;
        let settled = false;

        const settleReject = (error) => {
          if (settled) return;
          settled = true;
          URL.revokeObjectURL(url);
          currentAudio = null;
          reject(error);
        };

        const settleResolve = () => {
          if (settled) return;
          settled = true;
          URL.revokeObjectURL(url);
          currentAudio = null;
          resolve();
        };

        const tryPlay = () => {
          try {
            return audio.play();
          } catch (error) {
            settleReject(error instanceof Error ? error : new Error("音频播放失败"));
            return null;
          }
        };

        const startTimeout = setTimeout(() => {
          if (!started) {
            settleReject(new Error("音频未开始播放，可能受设备自动播放策略限制"));
          }
        }, 3500);

        audio.onplaying = () => {
          started = true;
          clearTimeout(startTimeout);
        };

        audio.onplay = () => {
          started = true;
          clearTimeout(startTimeout);
        };

        audio.oncanplay = () => {
          if (!started && !settled) {
            const retryResult = tryPlay();
            if (retryResult && typeof retryResult.catch === "function") {
              retryResult.catch(error => {
                clearTimeout(startTimeout);
                settleReject(error);
              });
            }
          }
        };

        audio.onended = () => {
          clearTimeout(startTimeout);
          settleResolve();
        };
        audio.onerror = () => {
          clearTimeout(startTimeout);
          settleReject(new Error("音频播放失败"));
        };

        const playResult = tryPlay();
        if (playResult && typeof playResult.then === "function") {
          playResult.catch(error => {
            clearTimeout(startTimeout);
            settleReject(error);
          });
        }
      });
    }

    async function speakWithMimo(text, token) {
      const url = await requestMimoAudioUrl(text, token, true);
      await playMimoAudioUrl(url);
    }

    async function speakText(text, token) {
      if (providerEl.value === "mimo") {
        await speakWithMimo(text, token);
        return;
      }
      await speakWithBrowser(text, token);
    }

    async function startPlayback() {
      const items = await ensureSpeakableItems();
      if (!items.length) {
        updateVoiceState("暂无可播放内容");
        return;
      }

      playbackRunning = true;
      playbackPaused = false;
      playbackToken += 1;
      const token = playbackToken;
      updatePlayButton();

      try {
        while (token === playbackToken) {
          const item = items[playbackCursor];
          setActiveCard(item.card);
          centerCard(item.card);

          if (providerEl.value === "mimo") {
            const currentUrl = await getMimoAudioUrl(items, playbackCursor, token, true);
            if (token !== playbackToken) return;
            mimoAudioUrlCache.delete(playbackCursor);

            const nextIndex = playbackCursor + 1 < items.length ? playbackCursor + 1 : (LOOP_CURRENT_DAY ? 0 : -1);
            preloadMimoAudio(items, nextIndex, token);

            updateVoiceState(`播放中 ${playbackCursor + 1}/${items.length}`);
            await playMimoAudioUrl(currentUrl);
          } else {
            updateVoiceState(`播放中 ${playbackCursor + 1}/${items.length}`);
            await speakText(item.text, token);
          }

          if (token !== playbackToken) {
            return;
          }
          playbackCursor += 1;

          if (playbackCursor >= items.length) {
            if (!LOOP_CURRENT_DAY) {
              break;
            }
            playbackCursor = 0;
          }
        }

        if (token === playbackToken) {
          stopPlayback("播放完成");
        }
      } catch (error) {
        stopPlayback(error.message || "播放失败");
      }
    }

    async function loadDate(dateString) {
      if (loadedDays.has(dateString)) return false;
      loadedDays.add(dateString);

      try {
        const res = await fetch(`${dateString}.json`);
        if (!res.ok) {
          renderEmpty(dateString, "本日数据尚在统计中");
          return false;
        }
        const data = await res.json();
        const summaries = Array.isArray(data.summary) ? data.summary : [];
        if (!summaries.length) {
          renderEmpty(dateString, "本日数据尚在统计中");
          return false;
        }
        const dayEl = renderDayTitle(data.date || dateString);
        summaries.forEach(item => renderCard(item, dayEl));
        return true;
      } catch (error) {
        renderEmpty(dateString, "本日数据尚在统计中");
        return false;
      }
    }

    function renderTagDirectory(items) {
      const dayEl = renderDayTitle("标签");
      const box = document.createElement("div");
      box.className = "tag-directory";

      items.forEach(item => {
        const link = document.createElement("a");
        link.className = "tag-directory-item";
        link.href = `?tag=${encodeURIComponent(item.tag)}`;

        const name = document.createElement("span");
        name.textContent = item.tag;
        link.appendChild(name);

        const count = document.createElement("span");
        count.className = "tag-directory-count";
        count.textContent = `${item.count}`;
        link.appendChild(count);

        box.appendChild(link);
      });

      dayEl.appendChild(box);
    }

    function renderGroupDirectory(items) {
      if (!groupLinksEl) return;
      groupLinksEl.textContent = "";
      items.forEach(item => {
        const link = document.createElement("a");
        link.className = "top-btn";
        link.href = `?group=${encodeURIComponent(item.group)}`;
        if (item.group === CURRENT_GROUP) {
          link.classList.add("active");
          link.setAttribute("aria-current", "page");
        }
        link.textContent = item.group;
        groupLinksEl.appendChild(link);
      });
    }

    async function loadTagsPage() {
      statusEl.textContent = "加载中...";
      try {
        const res = await fetch("tags.json");
        if (!res.ok) {
          renderEmpty("标签", "标签数据尚未生成");
          return;
        }
        const data = await res.json();
        const tags = Array.isArray(data.tags) ? data.tags : [];
        if (!tags.length) {
          renderEmpty("标签", "暂无标签数据");
          return;
        }
        renderTagDirectory(tags);
      } catch (error) {
        renderEmpty("标签", "标签数据加载失败");
      } finally {
        statusEl.textContent = "";
      }
    }

    async function loadGroupNav() {
      if (!groupLinksEl) return;
      try {
        const res = await fetch("group.json");
        if (!res.ok) {
          return;
        }
        const data = await res.json();
        const groups = Array.isArray(data.groups) ? data.groups : [];
        renderGroupDirectory(groups);
      } catch (error) {
        groupLinksEl.textContent = "";
      }
    }

    async function loadTagPage(tag) {
      if (!tag) {
        renderEmpty("标签", "未指定标签");
        return;
      }

      statusEl.textContent = "加载中...";
      const fileName = `tags/${encodeURIComponent(tag)}.json`;
      try {
        const res = await fetch(fileName);
        if (!res.ok) {
          renderEmpty(`标签：${tag}`, "该标签暂无数据");
          return;
        }
        const data = await res.json();
        const summaries = Array.isArray(data.summary) ? data.summary : [];
        if (!summaries.length) {
          renderEmpty(`标签：${tag}`, "该标签暂无数据");
          return;
        }
        const dayEl = renderDayTitle(`标签：${data.tag || tag}`);
        summaries.forEach(item => renderCard(item, dayEl));
      } catch (error) {
        renderEmpty(`标签：${tag}`, "标签数据加载失败");
      } finally {
        statusEl.textContent = "";
      }
    }

    async function loadGroupPage(group) {
      if (!group) {
        renderEmpty("分组", "未指定分组");
        return;
      }

      statusEl.textContent = "加载中...";
      const fileName = `groups/${encodeURIComponent(group)}.json`;
      try {
        const res = await fetch(fileName);
        if (!res.ok) {
          renderEmpty(`分组：${group}`, "该分组暂无数据");
          return;
        }
        const data = await res.json();
        const summaries = Array.isArray(data.summary) ? data.summary : [];
        if (!summaries.length) {
          renderEmpty(`分组：${group}`, "该分组暂无数据");
          return;
        }
        const dayEl = renderDayTitle(`分组：${data.group || group}`);
        summaries.forEach(item => renderCard(item, dayEl));
      } catch (error) {
        renderEmpty(`分组：${group}`, "分组数据加载失败");
      } finally {
        statusEl.textContent = "";
      }
    }

    async function loadNext() {
      if (loading || loadStoppedByEmptyDays) return;
      loading = true;
      statusEl.textContent = "加载中...";
      try {
        let consecutiveEmptyDays = 0;
        while (consecutiveEmptyDays < MAX_CONSECUTIVE_EMPTY_DAYS) {
          const current = nextDate;
          nextDate = previousDate(nextDate);
          const hasData = await loadDate(current);
          if (hasData) {
            return;
          }
          consecutiveEmptyDays += 1;
        }

        loadStoppedByEmptyDays = true;
        observer.unobserve(sentinel);
        statusEl.textContent = `前${MAX_CONSECUTIVE_EMPTY_DAYS}日连续暂无数据，已停止自动加载`;
        return;
      } finally {
        loading = false;
        if (!loadStoppedByEmptyDays) {
          statusEl.textContent = "";
        }
      }
    }

    const observer = new IntersectionObserver(entries => {
      if (entries.some(entry => entry.isIntersecting)) {
        loadNext();
      }
    }, { rootMargin: "220px 0px" });

    providerEl.addEventListener("change", () => {
      saveVoiceProvider();
      tokenWrapEl.classList.toggle("show", providerEl.value === "mimo");
      if (playbackRunning) {
        stopPlayback("服务已切换");
      }
    });

    tokenEl.addEventListener("input", () => {
      saveVoiceToken();
    });

    playToggleEl.addEventListener("click", () => {
      if (!playbackRunning) {
        playbackCursor = 0;
        startPlayback();
        return;
      }
      if (playbackPaused) {
        resumePlayback();
      } else {
        pausePlayback();
      }
    });

    stopEl.addEventListener("click", () => {
      stopPlayback("已停止");
    });

    restoreVoiceSettings();
    loadGroupNav();
    tagsButtonEl.classList.toggle("active", PAGE_MODE === "tags");
    if (PAGE_MODE === "home") {
      observer.observe(sentinel);
      loadNext();
    } else if (PAGE_MODE === "tags") {
      sentinel.style.display = "none";
      loadTagsPage();
    } else if (PAGE_MODE === "group") {
      sentinel.style.display = "none";
      loadGroupPage(CURRENT_GROUP);
    } else {
      sentinel.style.display = "none";
      loadTagPage(CURRENT_TAG);
    }
  </script>
</body>
</html>
